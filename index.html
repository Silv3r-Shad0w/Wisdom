<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fake Wisdom Generator</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f4f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .container {
      width: 100%;
      max-width: 600px;
    }

    h1 {
      font-size: 22px;
      font-weight: 500;
      color: #1a1a1a;
      margin-bottom: 1.5rem;
      text-align: center;
    }

    .category-bar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 1rem;
    }

    .cat-btn {
      padding: 4px 14px;
      border-radius: 99px;
      font-size: 13px;
      border: 0.5px solid #ccc;
      background: #ececec;
      color: #555;
      cursor: pointer;
      transition: all 0.15s;
    }
    .cat-btn:hover { background: #e0e0e0; }
    .cat-btn.active {
      border-color: #3a8fd4;
      color: #185FA5;
      background: #E6F1FB;
    }

    .quote-card {
      background: #fff;
      border: 0.5px solid #ddd;
      border-radius: 12px;
      padding: 2rem 2rem 1.5rem;
      margin: 1rem 0 1.5rem;
      min-height: 180px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      position: relative;
    }

    .quote-mark {
      font-size: 64px;
      line-height: 1;
      color: #ccc;
      font-family: Georgia, serif;
      position: absolute;
      top: 0.75rem;
      left: 1.5rem;
    }

    .quote-text {
      font-size: 18px;
      font-family: Georgia, serif;
      color: #1a1a1a;
      line-height: 1.7;
      margin-top: 1.5rem;
      font-style: italic;
    }

    .quote-author {
      margin-top: 1.25rem;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .author-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 500;
      flex-shrink: 0;
    }

    .author-name { font-size: 14px; font-weight: 500; color: #1a1a1a; }
    .author-title { font-size: 12px; color: #777; }

    .burger-btn {
      width: 100%;
      cursor: pointer;
      border: none;
      background: none;
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      transform-origin: center bottom;
    }
    .burger-btn.squish {
      animation: squish 0.35s cubic-bezier(.36,.07,.19,.97);
    }
    @keyframes squish {
      0%   { transform: scaleY(1)    scaleX(1); }
      30%  { transform: scaleY(0.45) scaleX(1.2); }
      60%  { transform: scaleY(1.1)  scaleX(0.95); }
      80%  { transform: scaleY(0.95) scaleX(1.02); }
      100% { transform: scaleY(1)    scaleX(1); }
    }

    .bun-top {
      width: 100%;
      height: 36px;
      background: #D4821A;
      border-radius: 80px 80px 0 0;
      position: relative;
    }
    .sesame {
      width: 7px; height: 4px;
      background: #F5C97A;
      border-radius: 50%;
      position: absolute;
    }
    .lettuce {
      width: 100%;
      height: 14px;
      background: #4CAF50;
      clip-path: polygon(
        0% 60%, 4% 20%, 8% 70%, 12% 15%, 16% 65%, 20% 20%, 24% 70%, 28% 15%,
        32% 65%, 36% 20%, 40% 70%, 44% 15%, 48% 65%, 52% 20%, 56% 70%, 60% 15%,
        64% 65%, 68% 20%, 72% 70%, 76% 15%, 80% 65%, 84% 20%, 88% 70%, 92% 15%,
        96% 65%, 100% 30%, 100% 100%, 0% 100%
      );
    }
    .tomato { width: 100%; height: 10px; background: #E53935; }
    .cheese {
      width: calc(100% + 8px);
      height: 10px;
      background: #FDD835;
      margin-left: -4px;
      clip-path: polygon(0 0, 100% 0, 96% 100%, 4% 100%);
    }
    .patty { width: 100%; height: 22px; background: #6D3B1E; border-radius: 3px; }
    .bun-bottom {
      width: 100%;
      height: 22px;
      background: #C47A15;
      border-radius: 0 0 14px 14px;
    }
    .burger-label {
      margin-top: 8px;
      font-size: 14px;
      font-weight: 500;
      color: #555;
      letter-spacing: 0.02em;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Fake Wisdom Generator</h1>

    <div class="category-bar" id="cats"></div>

    <div class="quote-card">
      <div class="quote-mark">"</div>
      <div class="quote-text" id="qt">Click the burger below to receive wisdom.</div>
      <div class="quote-author" id="qa" style="display:none">
        <div class="author-avatar" id="av"></div>
        <div>
          <div class="author-name" id="an"></div>
          <div class="author-title" id="at"></div>
        </div>
      </div>
    </div>

    <button class="burger-btn" id="burgerBtn" onclick="handleClick()">
      <div class="bun-top">
        <div class="sesame" style="top:8px;left:22%"></div>
        <div class="sesame" style="top:12px;left:38%"></div>
        <div class="sesame" style="top:6px;left:55%"></div>
        <div class="sesame" style="top:13px;left:70%"></div>
        <div class="sesame" style="top:7px;left:82%"></div>
      </div>
      <div class="lettuce"></div>
      <div class="tomato"></div>
      <div class="cheese"></div>
      <div class="patty"></div>
      <div class="bun-bottom"></div>
      <div class="burger-label">give me wisdom</div>
    </button>
  </div>

  <script>
    const quotes = {
      life: [
        ["The early bird gets the worm, but the second mouse gets the cheese.", "Linda Fishburne", "Life Coach & Cheese Enthusiast"],
        ["Life is like a sandwich. The more you add to it, the harder it is to fit in your mouth.", "Dr. Marcus Blobbs", "Professor of Sandwich Philosophy"],
        ["You miss 100% of the naps you don't take.", "Wayne Gretzky's cousin", "Professional Napper"],
        ["Never put off until tomorrow what you can also not do today.", "Helena Snooze", "Procrastination Expert"],
        ["The meaning of life is simply to outlive your houseplants.", "Gary Fern", "Plant Funeral Director"],
        ["Follow your dreams, unless your dreams involve running — then walk briskly.", "Coach T. Redd", "Motivational Slow-Jogger"],
      ],
      success: [
        ["Success is 10% inspiration, 90% pretending you know what you're doing in meetings.", "Brad Confuse", "Fortune 500 CEO"],
        ["The secret to success is to look very busy when your boss walks by.", "Patricia Slackoff", "Award-Winning Employee"],
        ["Winners never quit... unless the WiFi goes down.", "Kevin Disconnect", "Remote Work Guru"],
        ["Believe you can and you're halfway there. The other half is someone else's spreadsheet.", "Theodore Wrongsheet", "Excel Visionary"],
        ["Work smarter, not harder. Then take credit for someone else working harder.", "Chad Promoted", "Director of Vibes"],
        ["To succeed, you must first believe that cereal is a valid dinner.", "Sandra Crunch", "Startup Founder"],
      ],
      wisdom: [
        ["A wise man once said nothing, and everyone thought he was brilliant.", "Anonymous Wise Man", "Professional Silence Expert"],
        ["Not all who wander are lost. Some are just looking for the bathroom.", "Frodo Baggins' plumber", "Pipework Philosopher"],
        ["The greatest teacher is failure — but also, just read the instructions.", "Yoda's handyman", "IKEA Enlightenment Coach"],
        ["With great power comes a great electricity bill.", "Uncle Ben & Jerry", "Utility Philosopher"],
        ["Knowledge is knowing a tomato is a fruit. Wisdom is not putting it in a fruit salad. Genius is eating it anyway.", "Professor T. Salad", "Culinary Ontologist"],
        ["The pen is mightier than the sword, unless the sword is really big.", "Gerard Pointless", "Medieval Stationery Expert"],
      ],
      love: [
        ["Love is blind, but marriage is a real eye-opener, especially regarding dishes.", "Brenda Sink", "Marital Dishwasher Advocate"],
        ["Behind every great person is someone wondering what they're having for dinner.", "Chef Antoine Confusion", "Nutritional Philosopher"],
        ["The best relationships are built on trust, communication, and sharing Netflix passwords.", "Dr. Hulu Johnson", "Streaming Couples Therapist"],
        ["You had me at 'the food is free'.", "Jerry Snacks", "Networking Event Romantic"],
        ["Absence makes the heart grow fonder — and the fridge emptier.", "Patricia Hungry", "Long-Distance Snack Philosopher"],
      ],
    };

    const colors = [
      {bg:'#E6F1FB',cl:'#0C447C'},{bg:'#E1F5EE',cl:'#085041'},
      {bg:'#FAEEDA',cl:'#633806'},{bg:'#FBEAF0',cl:'#72243E'},
      {bg:'#EEEDFE',cl:'#3C3489'},{bg:'#FAECE7',cl:'#712B13'},
    ];

    const categories = Object.keys(quotes);
    let activeCategory = 'all';
    let lastIdx = -1;

    function initCats() {
      const bar = document.getElementById('cats');
      const all = document.createElement('button');
      all.className = 'cat-btn active'; all.textContent = 'All';
      all.onclick = () => setCategory('all', all);
      bar.appendChild(all);
      categories.forEach(c => {
        const b = document.createElement('button');
        b.className = 'cat-btn';
        b.textContent = c.charAt(0).toUpperCase() + c.slice(1);
        b.onclick = () => setCategory(c, b);
        bar.appendChild(b);
      });
    }

    function setCategory(cat, el) {
      activeCategory = cat;
      document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
      el.classList.add('active');
      lastIdx = -1;
      generate();
    }

    function handleClick() {
      const btn = document.getElementById('burgerBtn');
      btn.classList.remove('squish');
      void btn.offsetWidth;
      btn.classList.add('squish');
      generate();
    }

    function generate() {
      let pool = activeCategory === 'all'
        ? categories.flatMap(c => quotes[c])
        : quotes[activeCategory];
      let idx;
      do { idx = Math.floor(Math.random() * pool.length); } while (pool.length > 1 && idx === lastIdx);
      lastIdx = idx;
      const [text, name, title] = pool[idx];
      const col = colors[Math.floor(Math.random() * colors.length)];
      const initials = name.split(' ').map(w => w[0]).join('').slice(0,2);
      document.getElementById('qt').textContent = text;
      document.getElementById('an').textContent = '— ' + name;
      document.getElementById('at').textContent = title;
      document.getElementById('qa').style.display = 'flex';
      const av = document.getElementById('av');
      av.textContent = initials;
      av.style.background = col.bg;
      av.style.color = col.cl;
    }

    initCats();
    generate();
  </script>
</body>
</html>
